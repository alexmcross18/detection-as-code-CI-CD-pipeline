name: Deploy Watchlist to Sentinel

on: 
    workflow_dispatch:
        inputs:
            client:
                description: 'Client to deploy to (must match GitHub Environment name)'
                required: true
                type: string

jobs:
    deploy:
      runs-on: ubuntu-latest
      environment: ${{ inputs.client }}
      permissions:
          id-token: write
          contents: read

      steps:
          - name: Checkout Repo
            uses: actions/checkout@v4

          - name: Login to Azure
            uses: azure/login@v2
            with:
              client-id: ${{ vars.AZURE_CLIENT_ID }}
              tenant-id: ${{ vars.AZURE_TENANT_ID }}
              subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

          - name: Install Sentinel Extension
            run: az extension add --name sentinel --allow-preview true

          - name: Deploy Watchlist
            run: |
              az deployment group create \
                --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
                --template-file watchlists/knownLocations.bicep \
                --parameters workspaceName=${{ vars.AZURE_WORKSPACE }}
