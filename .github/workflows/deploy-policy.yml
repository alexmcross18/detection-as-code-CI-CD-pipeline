name: Deploy Azure Policy
on: 
    workflow_dispatch:
        inputs:
            client:
                description: 'Client to deploy to (must match GitHub Environment name)'
                required: true
                type: string

jobs:
    deploy:
      runs-on: ubuntu-latest
      environment: ${{ inputs.client }}
      permissions:
          id-token: write
          contents: read
      steps:
          - name: Checkout Repo
            uses: actions/checkout@v4

          - name: Login to Azure
            uses: azure/login@v3
            with:
              client-id: ${{ vars.AZURE_CLIENT_ID }}
              tenant-id: ${{ vars.AZURE_TENANT_ID }}
              subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

          - name: Validate template
            run: |
              for file in infrastructure/Azure-Policy-as-Code/*.json; do
                echo "Validating $file"
                az deployment sub validate \
                --location ${{ vars.AZURE_LOCATION }} \
                --template-file "$file" \
                --subscription ${{ vars.AZURE_SUBSCRIPTION_ID }}
              done
          
          - name: Deploy Policy
            if: github.event_name == 'workflow_dispatch'
            run: |
              for file in infrastructure/Azure-Policy-as-Code/*.json; do
                echo "Deploying $file"
                az deployment sub create \
                --location ${{ vars.AZURE_LOCATION }} \
                --template-file "$file" \
                --subscription ${{ vars.AZURE_SUBSCRIPTION_ID }}
              done
