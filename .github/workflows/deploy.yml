# Name of the workflow.
name: Deploy Sentinel Detection

# Set to run when I action it.
on:
  workflow_dispatch:

# Runs on a Ubuntu VM.
jobs:
  deploy:
    runs-on: ubuntu-latest

# Gives the VM the ability to see my repo and the files in it.
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

# Logs into Azure using the Secret "AZURE_CREDENTIALS" stored in this repo's settings.
      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

# Validates that the resource group and workspace is there and validates that there aren't any issues with the json file.
      - name: Validate template
        run: |
          az deployment group validate \
          --resource-group sentinelrg \
          --template-file detections/1.json \
          --parameters workspace=lawSentinel

# Deploys the detection.
      - name: Deploy detection
        run: |
          az deployment group create \
          --resource-group sentinelrg \
          --template-file detections/1.json \
          --parameters workspace=lawSentinel
